<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição para o Combate 2v2</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #23232e;
            color: #f1f1f1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            background-color: #2c2f3b;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        h1 img {
            width: 30px;
            height: 30px;
        }

        .info {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .vaga-info {
            background-color: #f44336;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 1.2rem;
        }

        .form-section {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #f1f1f1;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2c2f3b;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #218838;
        }

        .players-list {
            background-color: #333;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            overflow-y: scroll;
            height: 150px;
        }

        .players-list ul {
            padding: 0;
            margin: 0;
            list-style-type: none;
        }

        .players-list li {
            padding: 8px;
            border-bottom: 1px solid #555;
        }

        .pix-info {
            background-color: #333;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .pix-info p {
            margin: 5px 0;
        }

        .pix-info strong {
            color: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1><span role="img" aria-label="Trophy">🏆</span> Diário do DK <span role="img" aria-label="Money Bag">💰</span></h1>

        <!-- Vagas restantes -->
        <div class="vaga-info">
            <p>Vagas: <span id="vagasRestantes">9</span> Restantes</p>
        </div>

        <!-- Formulário de Inscrição -->
        <form id="inscricaoForm">
            <div class="form-section">
                <label for="jogador1Nome">Nome do Jogador 1:</label>
                <input type="text" id="jogador1Nome" placeholder="Digite seu nome" required>

                <label for="jogador1Nick">Nick do Brawl Stars (Jogador 1):</label>
                <input type="text" id="jogador1Nick" placeholder="Digite seu nick" required>
            </div>

            <div class="form-section">
                <label for="jogador2Nome">Nome do Jogador 2:</label>
                <input type="text" id="jogador2Nome" placeholder="Digite o nome do parceiro" required>

                <label for="jogador2Nick">Nick do Brawl Stars (Jogador 2):</label>
                <input type="text" id="jogador2Nick" placeholder="Digite o nick do parceiro" required>
            </div>

            <div class="form-section">
                <label for="whatsApp1">Número de WhatsApp do Jogador 1:</label>
                <input type="text" id="whatsApp1" placeholder="Digite o número de WhatsApp do Jogador 1" required>

                <label for="whatsApp2">Número de WhatsApp do Jogador 2:</label>
                <input type="text" id="whatsApp2" placeholder="Digite o número de WhatsApp do Jogador 2" required>
            </div>

            <button type="submit">Garantir Vaga</button>
        </form>

        <!-- Lista de jogadores -->
        <div class="players-list">
            <h3>Jogadores Inscritos:</h3>
            <ul id="playersList">
                <!-- Lista dinâmica de duplas -->
            </ul>
        </div>

        <!-- Pix info -->
        <div class="pix-info">
            <p>Para finalizar a inscrição, faça o pagamento via <strong>Pix</strong>.</p>
            <p><strong>Chave Pix: 11998385244</strong></p>
            <p>Envie o comprovante para confirmação da vaga!</p>
        </div>
    </div>

    <script>
        let vagas = 9; // Inicialmente 9 vagas disponíveis (10 pessoas no total, considerando o organizador)

        // Função para atualizar as vagas
        function atualizarVagas() {
            document.getElementById('vagasRestantes').textContent = vagas;
        }

        // Preenche a lista de jogadores inscritos
        function adicionarJogador(jogador1Nome, jogador1Nick, jogador2Nome, jogador2Nick) {
            const playersList = document.getElementById('playersList');
            const li = document.createElement('li');
            li.textContent = `${jogador1Nome} (${jogador1Nick}) + ${jogador2Nome} (${jogador2Nick})`;
            playersList.appendChild(li);
        }

        // Envio do formulário
        document.getElementById('inscricaoForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            if (vagas <= 0) {
                alert("Não há vagas disponíveis.");
                return;
            }

            // Pegando os dados do formulário
            const jogador1Nome = document.getElementById('jogador1Nome').value;
            const jogador1Nick = document.getElementById('jogador1Nick').value;
            const jogador2Nome = document.getElementById('jogador2Nome').value;
            const jogador2Nick = document.getElementById('jogador2Nick').value;
            const whatsApp1 = document.getElementById('whatsApp1').value;
            const whatsApp2 = document.getElementById('whatsApp2').value;

            // Validando os campos
            if (jogador1Nome && jogador1Nick && jogador2Nome && jogador2Nick && whatsApp1 && whatsApp2) {
                // Adiciona a dupla à lista
                adicionarJogador(jogador1Nome, jogador1Nick, jogador2Nome, jogador2Nick);

                // Atualiza o número de vagas restantes
                vagas--;
                atualizarVagas();

                // Limpa o formulário após a inscrição
                document.getElementById('inscricaoForm').reset();
                
                alert(`Inscrição Confirmada!`);
            } else {
                alert('Por favor, preencha todos os campos.');
            }
        });
    </script>

</body>
</html>
